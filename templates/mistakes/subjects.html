{% extends 'base.html' %}

{% block title %}学科管理 - 错题猎手{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
        <h1>学科管理</h1>
        <a href="{% url 'subject_create' %}" class="btn btn-primary">添加学科</a>
    </div>
</div>

<div class="row">
    {% for subject in subjects %}
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title d-flex align-items-center">
                        <span class="badge me-2" style="background-color: {{ subject.color }}; width: 20px; height: 20px; display: inline-block;"></span>
                        {{ subject.name }}
                    </h5>
                    <p class="card-text">错题数: {{ subject.mistakes.count }}</p>
                </div>
            </div>
        </div>
    {% empty %}
        <div class="col-12">
            <div class="text-center py-5">
                <h4>暂无学科</h4>
                <p class="text-muted">添加您的第一个学科开始使用吧！</p>
                <a href="{% url 'subject_create' %}" class="btn btn-primary">添加学科</a>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
