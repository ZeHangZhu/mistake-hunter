{% extends 'base.html' %}

{% block title %}添加学科 - 错题猎手{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>添加学科</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">学科名称</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">主题颜色</label>
                <input type="color" name="color" class="form-control form-control-color" value="#007bff">
            </div>
            <div class="d-flex justify-content-between">
                <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
