{% extends 'base.html' %}

{% block title %}添加错题 - 错题猎手{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
    .img-container {
        max-width: 100%;
        height: 400px;
        overflow: hidden;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    .img-preview {
        width: 100px;
        height: 100px;
        overflow: hidden;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1>添加错题</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        {% if not subjects %}
            <div class="alert alert-warning text-center">
                <h5>还没有创建学科！</h5>
                <p class="mb-3">请先创建学科，然后再添加错题。</p>
                <a href="{% url 'subject_create' %}" class="btn btn-primary">立即创建学科</a>
            </div>
        {% else %}
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">题目标题 <span style="color: red;">*</span></label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">学科 <span style="color: red;">*</span></label>
                    <select name="subject" class="form-select" required>
                        <option value="">请选择学科</option>
                        {% for subject in subjects %}
                            <option value="{{ subject.pk }}">{{ subject.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">题干内容 <span style="color: red;">*</span></label>
                <div class="mb-2">
                    <input type="file" id="imageInput" name="image" accept="image/*" capture="camera" class="form-control">
                </div>
                <div class="img-container mb-2">
                    <img id="image" src="" alt="选择图片">
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <button type="button" id="cropBtn" class="btn btn-primary">裁剪图片</button>
                    <button type="button" id="resetBtn" class="btn btn-secondary">重置</button>
                </div>
                <div class="img-preview"></div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">解题过程</label>
                <textarea name="solution" class="form-control" rows="4"></textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">正确答案</label>
                    <textarea name="correct_answer" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">我的答案</label>
                    <textarea name="user_answer" class="form-control" rows="3"></textarea>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">错因类型 <span style="color: red;">*</span></label>
                    <select name="error_cause" class="form-select" required>
                        <option value="knowledge">知识性错误</option>
                        <option value="logic">逻辑性错误</option>
                        <option value="habit">习惯性错误</option>
                        <option value="custom">自定义</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">自定义错因</label>
                    <input type="text" name="custom_error_cause" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">难度</label>
                    <select name="difficulty" class="form-select">
                        <option value="1">简单</option>
                        <option value="2" selected>中等</option>
                        <option value="3">困难</option>
                    </select>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">错因分析</label>
                <textarea name="analysis" class="form-control" rows="4"></textarea>
            </div>
            
            <div class="mt-3 text-muted">
                <small><span style="color: red;">*</span> 标记的字段为必填项</small>
            </div>
            
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'mistake_list' %}" class="btn btn-outline-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存错题</button>
            </div>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var image = document.getElementById('image');
        var imageInput = document.getElementById('imageInput');
        var cropBtn = document.getElementById('cropBtn');
        var resetBtn = document.getElementById('resetBtn');
        var cropper;
        
        // 监听文件选择
        imageInput.addEventListener('change', function(e) {
            var files = e.target.files;
            var done = function(url) {
                image.src = url;
                if (cropper) {
                    cropper.destroy();
                }
                cropper = new Cropper(image, {
                    aspectRatio: NaN,
                    viewMode: 3,
                    preview: '.img-preview'
                });
            };
            
            if (files && files.length > 0) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    done(e.target.result);
                };
                reader.readAsDataURL(files[0]);
            }
        });
        
        // 裁剪按钮点击事件
        cropBtn.addEventListener('click', function() {
            if (cropper) {
                var canvas = cropper.getCroppedCanvas({
                    width: 800,
                    height: 600
                });
                canvas.toBlob(function(blob) {
                    var newFile = new File([blob], 'cropped.jpg', {type: 'image/jpeg'});
                    var dataTransfer = new DataTransfer();
                    dataTransfer.items.add(newFile);
                    imageInput.files = dataTransfer.files;
                    alert('图片裁剪成功！');
                });
            }
        });
        
        // 重置按钮点击事件
        resetBtn.addEventListener('click', function() {
            if (cropper) {
                cropper.destroy();
                image.src = '';
                imageInput.value = '';
            }
        });
    });
</script>
{% endblock %}
