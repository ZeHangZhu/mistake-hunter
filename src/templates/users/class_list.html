{% extends 'base.html' %}

{% block title %}班级列表 - 错题猎手{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">班级列表</h1>
    
    <div class="card">
        <div class="card-header">
            <h5 class="card-title">我的班级</h5>
        </div>
        <div class="card-body">
            <a href="{% url 'create_class' %}" class="btn btn-primary mb-3">创建班级</a>
            
            {% if classes %}
            <ul class="list-group">
                {% for class in classes %}
                <li class="list-group-item">
                    <div class="d-flex justify-content-between align-items-center">
                        <span>{{ class.name }}</span>
                        <div>
                            <a href="{% url 'class_detail' class.id %}" class="btn btn-sm btn-info">查看详情</a>
                        </div>
                    </div>
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p class="text-muted">您还没有创建任何班级</p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
