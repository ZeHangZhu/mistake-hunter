{% extends 'base.html' %}

{% block title %}注册 - 错题猎手{% endblock %}

{% block before_container %}
<style>
    body {
        margin: 0;
        padding: 0;
    }
    .login-page {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .login-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }
    .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
    }
    .login-header h3 {
        margin: 0;
        font-size: 1.8rem;
        font-weight: 600;
    }
    .login-body {
        padding: 30px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #333;
    }
    .form-control {
        border: 2px solid #e9ecef;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        outline: none;
    }
    .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        width: 100%;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .login-footer {
        margin-top: 20px;
        text-align: center;
    }
    .login-footer a {
        color: #667eea;
        text-decoration: none;
        transition: color 0.3s ease;
    }
    .login-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }
    .logo-container {
        text-align: center;
        margin-bottom: 20px;
    }
    .logo-container img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    .container {
        display: none !important;
    }
    nav {
        display: none !important;
    }
</style>
<div class="login-page">
    <div class="col-md-6 col-lg-4">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    {% load static %}
                    <img src="{% static 'icon.png' %}" alt="错题猎手">
                </div>
                <h3>注册</h3>
                <p class="mb-0">创建账号，开启你的学习之旅</p>
            </div>
            <div class="login-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn-login">注册</button>
                </form>
                <div class="login-footer">
                    <a href="{% url 'login' %}">已有账号？立即登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
{% endblock %}

{% block container_class %}
{% endblock %}
