{% extends 'base.html' %}

{% block title %}注册 - 错题猎手{% endblock %}

{% block before_container %}
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #f8f9fa;
    }
    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    .login-card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .login-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }
    .login-header {
        background-color: #007bff;
        color: white;
        padding: 20px;
        text-align: center;
    }
    .login-header h3 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
    }
    .login-body {
        padding: 25px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: #333;
    }
    .form-control {
        border: 1px solid #ced4da;
        border-radius: 4px;
        padding: 10px 12px;
        font-size: 1rem;
        transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .form-control:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        outline: none;
    }
    .btn-login {
        background-color: #007bff;
        border: 1px solid #007bff;
        border-radius: 4px;
        padding: 10px;
        font-size: 1rem;
        font-weight: 500;
        color: white;
        width: 100%;
        transition: background-color 0.15s ease-in-out, border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        cursor: pointer;
    }
    .btn-login:hover {
        background-color: #0056b3;
        border-color: #0056b3;
        transform: translateY(-1px);
        box-shadow: 0 0.25rem 0.5rem rgba(0, 123, 255, 0.2);
    }
    .login-footer {
        margin-top: 15px;
        text-align: center;
    }
    .login-footer a {
        color: #007bff;
        text-decoration: none;
        transition: color 0.15s ease-in-out;
    }
    .login-footer a:hover {
        color: #0056b3;
        text-decoration: underline;
    }
    .logo-container {
        text-align: center;
        margin-bottom: 15px;
    }
    .logo-container img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .container {
        display: none !important;
    }
    nav {
        display: none !important;
    }
</style>
<div class="login-page">
    <div class="col-md-6 col-lg-4">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    {% load static %}
                    <img src="{% static 'icon.png' %}" alt="错题猎手">
                </div>
                <h3>注册</h3>
                <p class="mb-0">创建账号，开启你的学习之旅</p>
            </div>
            <div class="login-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn-login">注册</button>
                </form>
                <div class="login-footer">
                    <a href="{% url 'login' %}">已有账号？立即登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
{% endblock %}

{% block container_class %}
{% endblock %}
