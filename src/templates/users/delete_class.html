{% extends 'base.html' %}

{% block title %}删除班级 - 错题猎手{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">删除班级</h1>
    
    <div class="card">
        <div class="card-header">
            <h5 class="card-title">确认删除</h5>
        </div>
        <div class="card-body">
            <p>您确定要删除班级 <strong>{{ class_obj.name }}</strong> 吗？此操作不可恢复。</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">确认删除</button>
                <a href="{% url 'class_detail' class_obj.id %}" class="btn btn-secondary">取消</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
